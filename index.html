<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cycl, a new loop for every bottle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper: #F2EDE3;
      --paper-2: #EAE3D3;
      --ink: #14120F;
      --ink-soft: #4A463E;
      --ink-mute: #8A857A;
      --moss: #0F3320;
      --moss-2: #07190F;
      --lime: #74C044;
      --lime-2: #2CB672;
      --lime-deep: #2CB672;
      --lime-grad: linear-gradient(160deg, #74C044 0%, #2CB672 100%);
      --rule: rgba(20, 18, 15, 0.14);
      --rule-light: rgba(255, 255, 255, 0.12);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      font-size: 15px;
      line-height: 1.55;
    }

    .serif {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      line-height: 1.02;
      letter-spacing: -0.025em;
    }

    em {
      font-style: italic;
      font-variation-settings: "SOFT" 80;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ::selection {
      background: var(--lime);
      color: var(--moss);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.035;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s cubic-bezier(.2, .7, .2, 1), transform 0.9s cubic-bezier(.2, .7, .2, 1);
    }

    .reveal.on {
      opacity: 1;
      transform: none;
    }

    .d1 {
      transition-delay: 0.08s;
    }

    .d2 {
      transition-delay: 0.18s;
    }

    .d3 {
      transition-delay: 0.28s;
    }

    .d4 {
      transition-delay: 0.38s;
    }

    nav.top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 18px 36px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      transition: background 0.3s, color 0.3s, border-color 0.3s, backdrop-filter 0.3s;
      color: var(--paper);
    }

    nav.top.over-light {
      color: var(--ink);
    }

    nav.top.scrolled.over-dark {
      background: rgba(15, 51, 32, 0.72);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    nav.top.scrolled.over-light {
      background: rgba(242, 237, 227, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--rule);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--lime-grad);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-word {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      letter-spacing: -0.02em;
      font-weight: 400;
    }

    .nav-mid {
      display: flex;
      gap: 28px;
    }

    .nav-mid a {
      font-size: 13px;
      opacity: 0.7;
      transition: opacity .2s;
    }

    .nav-mid a:hover {
      opacity: 1;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      font-size: 13px;
    }

    .nav-right .sep {
      opacity: 0.3;
    }

    .nav-pill {
      border: 1px solid currentColor;
      padding: 7px 14px;
      border-radius: 100px;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, color 0.2s;
    }

    .nav-pill:hover {
      background: currentColor;
    }

    .nav-pill:hover span {
      color: var(--moss);
    }

    .hero {
      min-height: 100vh;
      background: var(--moss);
      color: var(--paper);
      position: relative;
      padding: 120px 36px 48px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      flex: 1;
      align-content: space-between;
      max-width: 1480px;
      margin: 0 auto;
      width: 100%;
    }

    .hero-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      color: rgba(242, 237, 227, 0.55);
    }

    .hero-meta .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
      display: inline-block;
      margin-right: 8px;
      animation: pulse 2.4s infinite;
      vertical-align: middle;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .hero-title {
      font-size: clamp(64px, 11.5vw, 208px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--paper);
      max-width: 1400px;
    }

    .hero-title em {
      color: var(--lime);
      font-style: italic;
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-title .line {
      display: block;
      overflow: hidden;
    }

    .hero-title .line span {
      display: inline-block;
      animation: rise 1.2s cubic-bezier(.2, .8, .2, 1) both;
    }

    .hero-title .line:nth-child(1) span {
      animation-delay: 0.05s;
    }

    .hero-title .line:nth-child(2) span {
      animation-delay: 0.2s;
    }

    .hero-title .line:nth-child(3) span {
      animation-delay: 0.35s;
    }

    @keyframes rise {
      from {
        transform: translateY(110%);
      }

      to {
        transform: translateY(0);
      }
    }

    .hero-bottom {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 48px;
      align-items: end;
      padding-top: 40px;
      border-top: 1px solid rgba(242, 237, 227, 0.15);
    }

    .hero-lede {
      font-size: 17px;
      line-height: 1.5;
      color: rgba(242, 237, 227, 0.78);
      max-width: 420px;
      font-weight: 300;
    }

    .hero-ctas {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.25s cubic-bezier(.2, .7, .2, 1), background 0.2s, color 0.2s;
      font-family: 'Inter', sans-serif;
      gap: 20px;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--lime-grad);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--paper);
      border-color: rgba(242, 237, 227, 0.25);
    }

    .btn-ghost:hover {
      border-color: var(--paper);
    }

    .btn .arr {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      position: relative;
      flex-shrink: 0;
    }

    .btn .arr::after {
      content: '→';
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
      color: #fff;
    }

    .btn-primary .arr {
      background: rgba(255, 255, 255, 0.28);
    }

    .btn-primary .arr::after {
      color: #fff;
    }

    .btn-ghost .arr {
      background: var(--paper);
    }

    .btn-ghost .arr::after {
      color: var(--moss);
    }

    .hero-stats {
      display: flex;
      gap: 36px;
      justify-content: flex-end;
    }

    .hero-stat .n {
      font-family: 'Fraunces', serif;
      font-size: 42px;
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .hero-stat .l {
      font-size: 11px;
      margin-top: 8px;
      color: rgba(242, 237, 227, 0.5);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    .ticker {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 0;
      border-top: 1px solid rgba(242, 237, 227, 0.1);
      overflow: hidden;
      display: flex;
      gap: 48px;
      white-space: nowrap;
      color: rgba(242, 237, 227, 0.4);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ticker-track {
      display: flex;
      gap: 48px;
      animation: scroll 60s linear infinite;
      flex-shrink: 0;
    }

    .ticker-track span {
      display: inline-flex;
      align-items: center;
      gap: 48px;
    }

    .ticker-track span::after {
      content: '✦';
      color: var(--lime);
    }

    @keyframes scroll {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-100%);
      }
    }

    section {
      padding: 120px 36px;
      position: relative;
    }

    .frame {
      max-width: 1480px;
      margin: 0 auto;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 24px;
    }

    .eyebrow .num {
      color: var(--ink);
      font-weight: 500;
    }

    .eyebrow::before {
      content: '';
      width: 14px;
      height: 1px;
      background: currentColor;
    }

    .dark .eyebrow {
      color: rgba(242, 237, 227, 0.5);
    }

    .dark .eyebrow .num {
      color: var(--lime);
    }

    .counter-section {
      background: var(--paper);
      padding-top: 0;
      padding-bottom: 0;
    }

    .counter-band {
      padding: 64px 36px;
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 48px;
      align-items: center;
    }

    .counter-num {
      font-family: 'Fraunces', serif;
      font-size: clamp(72px, 12vw, 180px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--ink);
      font-variation-settings: "SOFT" 40, "opsz" 144;
    }

    .counter-num .tick {
      color: var(--lime-deep);
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .counter-side {
      text-align: right;
    }

    .counter-side p {
      max-width: 320px;
      margin-left: auto;
      color: var(--ink-soft);
      font-size: 15px;
    }

    .counter-side .label {
      margin-bottom: 16px;
    }

    .manifesto {
      background: var(--paper);
    }

    .manifesto-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 80px;
      align-items: start;
    }

    .manifesto h2 {
      font-size: clamp(44px, 5.2vw, 92px);
      letter-spacing: -0.03em;
      font-weight: 300;
    }

    .manifesto h2 em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .manifesto p {
      font-size: 18px;
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 520px;
      font-weight: 400;
    }

    .manifesto p+p {
      margin-top: 20px;
    }

    .manifesto .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-top: 1px solid var(--rule);
      margin-top: 56px;
    }

    .manifesto .stats>div {
      padding: 28px 0 0;
      border-right: 1px solid var(--rule);
      padding-right: 32px;
    }

    .manifesto .stats>div:last-child {
      border-right: none;
      padding-left: 32px;
      padding-right: 0;
    }

    .manifesto .stats .n {
      font-family: 'Fraunces', serif;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .manifesto .stats .n em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .manifesto .stats .l {
      font-size: 13px;
      color: var(--ink-mute);
      margin-top: 10px;
      max-width: 240px;
    }

    .flow {
      background: var(--moss);
      color: var(--paper);
      border-radius: 24px;
      padding: 56px;
    }

    .flow-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 48px;
    }

    .flow-head h3 {
      font-size: 32px;
      color: var(--paper);
    }

    .flow-head .mono {
      color: rgba(242, 237, 227, 0.45);
    }

    .flow-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .flow-step {
      border: 1px solid rgba(242, 237, 227, 0.15);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      background: rgba(255, 255, 255, 0.02);
      transition: background 0.3s;
    }

    .flow-step:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .flow-step .n {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--lime);
      letter-spacing: 0.1em;
    }

    .flow-step h4 {
      font-size: 22px;
      color: var(--paper);
      margin: 36px 0 8px;
      font-weight: 400;
    }

    .flow-step p {
      font-size: 13px;
      color: rgba(242, 237, 227, 0.55);
      line-height: 1.55;
    }

    .flow-step .ico {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(242, 237, 227, 0.2);
      display: grid;
      place-items: center;
    }

    .flow-step .ico svg {
      width: 16px;
      height: 16px;
      stroke: var(--lime);
      fill: none;
      stroke-width: 1.5;
    }

    .flow-step.accent {
      background: var(--lime-grad);
      color: #fff;
      border-color: transparent;
    }

    .flow-step.accent .n {
      color: #fff;
      opacity: 0.8;
    }

    .flow-step.accent h4 {
      color: #fff;
    }

    .flow-step.accent p {
      color: rgba(255, 255, 255, 0.85);
    }

    .flow-step.accent .ico {
      border-color: rgba(255, 255, 255, 0.4);
    }

    .flow-step.accent .ico svg {
      stroke: #fff;
    }

    .pillars {
      background: var(--paper);
    }

    .pillars-head {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: end;
      margin-bottom: 80px;
    }

    .pillars-head h2 {
      font-size: clamp(40px, 4.8vw, 80px);
      font-weight: 300;
    }

    .pillars-head p {
      color: var(--ink-soft);
      font-size: 16px;
      max-width: 440px;
      justify-self: end;
    }

    .pillars-list {
      display: flex;
      flex-direction: column;
    }

    .pillar {
      display: grid;
      grid-template-columns: 80px 1fr 1.5fr 60px;
      gap: 40px;
      padding: 44px 0;
      border-top: 1px solid var(--rule);
      align-items: start;
      transition: padding-left 0.4s cubic-bezier(.2, .7, .2, 1);
    }

    .pillar:last-child {
      border-bottom: 1px solid var(--rule);
    }

    .pillar:hover {
      padding-left: 16px;
    }

    .pillar .idx {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-mute);
      padding-top: 8px;
    }

    .pillar h3 {
      font-size: 36px;
      font-weight: 300;
    }

    .pillar p {
      color: var(--ink-soft);
      font-size: 15px;
      max-width: 520px;
    }

    .pillar .meta {
      padding-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-align: right;
      color: var(--ink-mute);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .station-section {
      background: var(--moss);
      color: var(--paper);
    }

    .station-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .station-left h2 {
      font-size: clamp(40px, 4.5vw, 72px);
      color: var(--paper);
      font-weight: 300;
    }

    .station-left h2 em {
      color: var(--lime);
    }

    .station-left p {
      color: rgba(242, 237, 227, 0.65);
      font-size: 16px;
      max-width: 460px;
      margin-top: 24px;
    }

    .station-left ul {
      list-style: none;
      margin-top: 40px;
    }

    .station-left li {
      padding: 16px 0;
      border-bottom: 1px solid rgba(242, 237, 227, 0.1);
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 16px;
      font-size: 15px;
      color: rgba(242, 237, 227, 0.85);
    }

    .station-left li::before {
      content: '→';
      color: var(--lime);
    }

    .station-viz {
      aspect-ratio: 4/5;
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.04), transparent);
      border: 1px solid rgba(242, 237, 227, 0.12);
      border-radius: 20px;
      padding: 40px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .station-viz.photo {
      aspect-ratio: 2/3;
      padding: 0;
      overflow: hidden;
      background: var(--moss);
    }

    .station-viz.photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .station-viz-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(242, 237, 227, 0.4);
      display: flex;
      justify-content: space-between;
    }

    .station-viz-mark {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .station-cyl {
      width: 60%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(242, 237, 227, 0.2);
      position: relative;
      animation: rot 30s linear infinite;
    }

    @keyframes rot {
      to {
        transform: rotate(360deg);
      }
    }

    .station-cyl::before,
    .station-cyl::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      border: 1px dashed rgba(242, 237, 227, 0.12);
    }

    .station-cyl::before {
      inset: 14%;
    }

    .station-cyl::after {
      inset: 28%;
      border: 1px solid rgba(242, 237, 227, 0.1);
    }

    .station-core {
      position: absolute;
      inset: 38%;
      border-radius: 16px;
      overflow: hidden;
      background: var(--lime-grad);
      display: grid;
      place-items: center;
      box-shadow: 0 0 100px rgba(44, 182, 114, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.15);
      animation: counter 30s linear infinite;
    }

    @keyframes counter {
      to {
        transform: rotate(-360deg);
      }
    }

    .station-core img {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .station-viz-bot {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid rgba(242, 237, 227, 0.1);
    }

    .station-viz-bot .cell {
      font-size: 11px;
      color: rgba(242, 237, 227, 0.5);
      font-family: 'JetBrains Mono', monospace;
    }

    .station-viz-bot .cell strong {
      display: block;
      color: var(--paper);
      font-size: 15px;
      margin-bottom: 2px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      text-transform: none;
      letter-spacing: 0;
    }

    .partners-band {
      background: var(--paper);
      padding: 80px 36px;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    .partners-inner {
      max-width: 1480px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 80px;
      align-items: center;
    }

    .partners-inner h4 {
      font-size: 20px;
      font-weight: 400;
      max-width: 240px;
    }

    .partners-logos {
      display: flex;
      gap: 56px;
      flex-wrap: wrap;
      align-items: center;
    }

    .plogo {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      color: var(--ink);
      opacity: 0.6;
    }

    .esg-section {
      background: var(--paper);
    }

    .esg-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 80px;
    }

    .esg-left h2 {
      font-size: clamp(40px, 4.5vw, 68px);
      font-weight: 300;
      margin-bottom: 24px;
    }

    .esg-left p {
      font-size: 16px;
      color: var(--ink-soft);
      max-width: 500px;
    }

    .esg-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-top: 48px;
    }

    .esg-metrics>div {
      padding: 24px 0;
      border-top: 1px solid var(--rule);
      padding-right: 24px;
    }

    .esg-metrics>div:nth-child(even) {
      padding-left: 24px;
      padding-right: 0;
    }

    .esg-metrics .n {
      font-family: 'Fraunces', serif;
      font-size: 44px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .esg-metrics .l {
      font-size: 12px;
      color: var(--ink-mute);
      margin-top: 8px;
    }

    .esg-chart {
      background: var(--ink);
      color: var(--paper);
      border-radius: 20px;
      padding: 32px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .esg-chart-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .esg-chart-top h4 {
      font-size: 18px;
      color: var(--paper);
      font-weight: 400;
    }

    .esg-chart-top .mono {
      color: var(--lime);
    }

    .bars {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 6px;
      align-items: end;
      height: 140px;
    }

    .bars>div {
      background: var(--lime-grad);
      border-radius: 2px 2px 0 0;
      transition: height 1.2s cubic-bezier(.2, .7, .2, 1);
    }

    .bars>div.dim {
      background: rgba(242, 237, 227, 0.15);
    }

    .esg-chart-foot {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(242, 237, 227, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .ops-section {
      background: var(--ink);
      color: var(--paper);
      border-radius: 24px 24px 0 0;
    }

    .ops-section .frame {
      max-width: 1480px;
    }

    .ops-head {
      text-align: center;
      max-width: 780px;
      margin: 0 auto 80px;
    }

    .ops-head .eyebrow {
      justify-content: center;
    }

    .ops-head .eyebrow::after {
      content: '';
      width: 14px;
      height: 1px;
      background: currentColor;
    }

    .ops-head h2 {
      font-size: clamp(44px, 5.5vw, 88px);
      color: var(--paper);
      font-weight: 300;
    }

    .ops-head h2 em {
      color: var(--lime);
    }

    .ops-head p {
      color: rgba(242, 237, 227, 0.6);
      font-size: 16px;
      margin-top: 20px;
    }

    .ops-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 60px;
    }

    .ops-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(242, 237, 227, 0.1);
      border-radius: 16px;
      padding: 32px 24px;
      position: relative;
      transition: background 0.3s, transform 0.3s;
    }

    .ops-card:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-4px);
    }

    .ops-card .n {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--lime);
      letter-spacing: 0.1em;
    }

    .ops-card h3 {
      font-size: 26px;
      color: var(--paper);
      margin: 60px 0 12px;
      font-weight: 400;
    }

    .ops-card p {
      font-size: 13px;
      color: rgba(242, 237, 227, 0.55);
      line-height: 1.6;
    }

    .ops-list {
      border-top: 1px solid rgba(242, 237, 227, 0.12);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .ops-list>div {
      padding: 20px 28px;
      border-bottom: 1px solid rgba(242, 237, 227, 0.08);
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      color: rgba(242, 237, 227, 0.75);
    }

    .ops-list>div:nth-child(odd) {
      border-right: 1px solid rgba(242, 237, 227, 0.08);
    }

    .ops-list>div::before {
      content: '+';
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      color: var(--lime);
      font-weight: 600;
      flex-shrink: 0;
    }

    .cta-section {
      background: var(--ink);
      padding: 120px 36px 180px;
      text-align: center;
    }

    .cta-section h2 {
      font-size: clamp(48px, 7vw, 140px);
      color: var(--paper);
      font-weight: 300;
      max-width: 1100px;
      margin: 0 auto 40px;
    }

    .cta-section h2 em {
      color: var(--lime);
    }

    .cta-section .row {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    footer {
      background: var(--moss);
      color: var(--paper);
      padding: 56px 36px 28px;
    }

    .foot-top {
      max-width: 1480px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 48px;
      padding-bottom: 64px;
      border-bottom: 1px solid rgba(242, 237, 227, 0.12);
    }

    .foot-brand .brand-word {
      font-size: 44px;
      display: block;
    }

    .foot-brand p {
      color: rgba(242, 237, 227, 0.55);
      max-width: 320px;
      margin-top: 16px;
      font-size: 14px;
    }

    .foot-col h5 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(242, 237, 227, 0.45);
      margin-bottom: 20px;
      font-weight: 500;
    }

    .foot-col ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .foot-col a {
      color: rgba(242, 237, 227, 0.8);
      font-size: 14px;
      transition: color .2s;
    }

    .foot-col a:hover {
      color: var(--lime);
    }

    .foot-bot {
      max-width: 1480px;
      margin: 0 auto;
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(242, 237, 227, 0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tw-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: var(--paper);
      color: var(--ink);
      border-radius: 16px;
      padding: 20px;
      width: 280px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
      border: 1px solid var(--rule);
      font-family: 'Inter', sans-serif;
    }

    .tw-panel h6 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .tw-panel h5 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      margin-bottom: 16px;
      font-weight: 400;
    }

    .tw-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tw-chip {
      padding: 6px 12px;
      border-radius: 100px;
      border: 1px solid var(--rule);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tw-chip.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .tw-sw {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tw-sw button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--rule);
      cursor: pointer;
      transition: transform 0.15s;
      padding: 0;
    }

    .tw-sw button:hover {
      transform: scale(1.12);
    }

    .tw-sw button.active {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    @media (max-width: 960px) {
      nav.top {
        padding: 14px 20px;
        grid-template-columns: 1fr auto;
      }

      .nav-mid {
        display: none;
      }

      section {
        padding: 80px 20px;
      }

      .hero {
        padding: 100px 20px 40px;
      }

      .hero-title {
        font-size: clamp(48px, 14vw, 96px);
      }

      .hero-bottom {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .hero-stats {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .counter-band {
        grid-template-columns: 1fr;
        padding: 40px 20px;
      }

      .counter-side {
        text-align: left;
      }

      .counter-side p {
        margin-left: 0;
      }

      .manifesto-grid,
      .station-grid,
      .esg-grid,
      .partners-inner {
        grid-template-columns: 1fr;
        gap: 48px;
      }

      .flow-steps,
      .ops-cards {
        grid-template-columns: 1fr 1fr;
      }

      .ops-list,
      .pillars-head {
        grid-template-columns: 1fr;
      }

      .pillar {
        grid-template-columns: 60px 1fr;
        gap: 16px;
      }

      .pillar .meta,
      .pillar>*:nth-child(3) {
        grid-column: 2;
      }

      .foot-top {
        grid-template-columns: 1fr 1fr;
      }

      .flow {
        padding: 32px 20px;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
 
  <script type="text/babel" src="js/index-page.js"></script>
</body>

</html>
