<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cycl, For Business Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper: #F2EDE3;
      --paper-2: #EAE3D3;
      --ink: #14120F;
      --ink-soft: #4A463E;
      --ink-mute: #8A857A;
      --moss: #0F3320;
      --moss-2: #07190F;
      --lime: #74C044;
      --lime-2: #2CB672;
      --lime-grad: linear-gradient(160deg, #74C044 0%, #2CB672 100%);
      --rule: rgba(20, 18, 15, 0.14);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      font-size: 15px;
      line-height: 1.55;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      line-height: 1.02;
      letter-spacing: -0.025em;
    }

    em {
      font-style: italic;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    ::selection {
      background: var(--lime);
      color: var(--moss);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.035;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s cubic-bezier(.2, .7, .2, 1), transform 0.9s cubic-bezier(.2, .7, .2, 1);
    }

    .reveal.on {
      opacity: 1;
      transform: none;
    }

    .d1 {
      transition-delay: 0.08s;
    }

    .d2 {
      transition-delay: 0.18s;
    }

    .d3 {
      transition-delay: 0.28s;
    }

    .d4 {
      transition-delay: 0.38s;
    }

    /* NAV */
    nav.top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 18px 36px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      color: var(--paper);
      transition: background 0.3s, color 0.3s, border-color 0.3s, backdrop-filter 0.3s;
    }

    nav.top.over-light {
      color: var(--ink);
    }

    nav.top.scrolled.over-dark {
      background: rgba(15, 51, 32, 0.72);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    nav.top.scrolled.over-light {
      background: rgba(242, 237, 227, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--rule);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--lime-grad);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand-word {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .nav-mid {
      display: flex;
      gap: 28px;
    }

    .nav-mid a {
      font-size: 13px;
      opacity: 0.7;
      transition: opacity .2s;
    }

    .nav-mid a:hover,
    .nav-mid a.active {
      opacity: 1;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      font-size: 13px;
    }

    .nav-right .sep {
      opacity: 0.3;
    }

    .nav-pill {
      border: 1px solid currentColor;
      padding: 7px 14px;
      border-radius: 100px;
      font-size: 12px;
      display: inline-flex;
      gap: 6px;
      transition: background 0.2s, color 0.2s;
    }

    .nav-pill:hover {
      background: currentColor;
    }

    .nav-pill:hover span {
      color: var(--moss);
    }

    /* HERO */
    .hero {
      min-height: 92vh;
      background: var(--moss);
      color: var(--paper);
      padding: 140px 36px 64px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .hero-glow {
      position: absolute;
      right: -20%;
      top: -20%;
      width: 70%;
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(44, 182, 114, 0.35), transparent 60%);
      pointer-events: none;
    }

    .hero-crumb {
      display: flex;
      gap: 8px;
      align-items: center;
      color: rgba(242, 237, 227, 0.5);
      margin-bottom: 48px;
      position: relative;
    }

    .hero-crumb a:hover {
      color: var(--paper);
    }

    .hero-crumb .sep {
      opacity: 0.4;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 80px;
      align-items: end;
      flex: 1;
      position: relative;
    }

    .hero h1 {
      font-size: clamp(56px, 9vw, 156px);
      line-height: 0.92;
      color: var(--paper);
      letter-spacing: -0.035em;
      font-weight: 300;
    }

    .hero h1 em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-right {
      padding-bottom: 12px;
    }

    .hero-lede {
      font-size: 18px;
      color: rgba(242, 237, 227, 0.78);
      max-width: 420px;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .hero-ctas {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.25s cubic-bezier(.2, .7, .2, 1), filter 0.2s;
      border: 1px solid transparent;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--lime-grad);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--paper);
      border-color: rgba(242, 237, 227, 0.25);
    }

    .btn-ghost:hover {
      border-color: var(--paper);
    }

    .btn .arr {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      position: relative;
    }

    .btn .arr::after {
      content: '→';
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
      color: #fff;
    }

    .btn-ghost .arr {
      background: var(--paper);
    }

    .btn-ghost .arr::after {
      color: var(--moss);
    }

    .hero-ticker {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid rgba(242, 237, 227, 0.12);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
    }

    .hero-ticker .cell .n {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      color: var(--paper);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .hero-ticker .cell .n em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-ticker .cell .l {
      font-size: 11px;
      margin-top: 8px;
      color: rgba(242, 237, 227, 0.55);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    /* INTRO LETTER */
    .letter {
      background: var(--paper);
      padding: 140px 36px;
    }

    .letter-inner {
      max-width: 980px;
      margin: 0 auto;
    }

    .letter .mono {
      color: var(--ink-mute);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .letter .mono::before {
      content: '';
      width: 14px;
      height: 1px;
      background: currentColor;
    }

    .letter h2 {
      font-size: clamp(32px, 3.8vw, 58px);
      font-weight: 300;
      max-width: 900px;
      margin-bottom: 40px;
    }

    .letter h2 em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .letter p {
      font-size: 19px;
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 720px;
    }

    .letter p+p {
      margin-top: 20px;
    }

    .letter .sig {
      margin-top: 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--ink-soft);
      font-size: 14px;
    }

    .letter .sig .name {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-style: italic;
      color: var(--ink);
    }

    /* INCLUDED */
    .included {
      background: var(--paper);
      padding: 60px 36px 140px;
    }

    .included-inner {
      max-width: 1480px;
      margin: 0 auto;
    }

    .included-head {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: end;
      margin-bottom: 72px;
    }

    .included-head h2 {
      font-size: clamp(40px, 4.8vw, 84px);
      font-weight: 300;
    }

    .included-head h2 em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .included-head p {
      color: var(--ink-soft);
      font-size: 16px;
      max-width: 440px;
      justify-self: end;
    }

    .inc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .inc-card {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 36px 32px 40px;
      display: flex;
      flex-direction: column;
      transition: transform 0.4s cubic-bezier(.2, .7, .2, 1), box-shadow 0.4s;
    }

    .inc-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(20, 18, 15, 0.08);
    }

    .inc-card .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 28px;
    }

    .inc-card .tag::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
    }

    .inc-card h3 {
      font-size: 30px;
      font-weight: 400;
      margin-bottom: 14px;
    }

    .inc-card>p {
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 28px;
      min-height: 66px;
    }

    .inc-card ul {
      list-style: none;
      border-top: 1px solid var(--rule);
      margin-top: auto;
    }

    .inc-card li {
      padding: 12px 0;
      border-bottom: 1px solid var(--rule);
      font-size: 14px;
      color: var(--ink);
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 12px;
      align-items: baseline;
    }

    .inc-card li:last-child {
      border-bottom: none;
    }

    .inc-card li::before {
      content: '+';
      color: var(--lime-2);
      font-weight: 500;
    }

    .inc-card .vis {
      height: 140px;
      margin: -10px -8px 28px;
      border-radius: 14px;
      background: var(--paper);
      border: 1px dashed var(--rule);
      display: grid;
      place-items: center;
      color: var(--ink-mute);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .inc-card .vis.station {
      background: var(--moss);
      color: rgba(242, 237, 227, 0.5);
    }

    .inc-card .vis.station::before {
      content: '';
      position: absolute;
      inset: 50% auto auto 50%;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: var(--lime-grad);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 60px rgba(44, 182, 114, 0.45);
    }

    .inc-card .vis.station::after {
      content: '';
      position: absolute;
      inset: 50% auto auto 50%;
      width: 94px;
      height: 94px;
      border-radius: 50%;
      border: 1px dashed rgba(242, 237, 227, 0.25);
      transform: translate(-50%, -50%);
    }

    .inc-card .vis.dash {
      padding: 14px;
      align-items: stretch;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: var(--moss);
      color: transparent;
    }

    .inc-card .vis.dash .row {
      display: flex;
      gap: 6px;
    }

    .inc-card .vis.dash .row>span {
      height: 10px;
      border-radius: 3px;
      background: rgba(242, 237, 227, 0.1);
      flex: 1;
    }

    .inc-card .vis.dash .row>span.lg {
      background: var(--lime-grad);
      flex: 2;
    }

    .inc-card .vis.dash .bars {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
      align-items: end;
      flex: 1;
    }

    .inc-card .vis.dash .bars>span {
      background: var(--lime-grad);
      border-radius: 2px 2px 0 0;
    }

    .inc-card .vis.dash .bars>span.dim {
      background: rgba(242, 237, 227, 0.12);
    }

    .inc-card .vis.support {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: transparent;
      align-items: flex-start;
    }

    .inc-card .vis.support .msg {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 12px 12px 12px 2px;
      padding: 6px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--ink);
      text-transform: none;
      letter-spacing: 0;
    }

    .inc-card .vis.support .msg.mine {
      background: var(--lime-grad);
      color: #fff;
      border: none;
      border-radius: 12px 12px 2px 12px;
      align-self: flex-end;
    }

    /* ECONOMICS */
    .econ {
      background: var(--moss);
      color: var(--paper);
      padding: 140px 36px;
      position: relative;
      overflow: hidden;
    }

    .econ::before {
      content: '';
      position: absolute;
      left: -15%;
      bottom: -20%;
      width: 60%;
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(116, 192, 68, 0.22), transparent 60%);
      pointer-events: none;
    }

    .econ-inner {
      max-width: 1480px;
      margin: 0 auto;
      position: relative;
    }

    .econ .mono {
      color: rgba(242, 237, 227, 0.55);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .econ .mono::before {
      content: '';
      width: 14px;
      height: 1px;
      background: currentColor;
    }

    .econ .mono .num {
      color: var(--lime);
    }

    .econ h2 {
      font-size: clamp(40px, 4.8vw, 84px);
      color: var(--paper);
      font-weight: 300;
      max-width: 900px;
      margin-bottom: 20px;
    }

    .econ h2 em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .econ>.econ-inner>p {
      color: rgba(242, 237, 227, 0.6);
      max-width: 560px;
      font-size: 16px;
      margin-bottom: 64px;
    }

    .econ-sheet {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(242, 237, 227, 0.12);
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .econ-col {
      padding: 48px;
    }

    .econ-col.left {
      border-right: 1px solid rgba(242, 237, 227, 0.12);
    }

    .econ-col .ch {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(242, 237, 227, 0.5);
      margin-bottom: 28px;
    }

    .econ-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid rgba(242, 237, 227, 0.08);
      font-size: 15px;
    }

    .econ-line .lbl {
      color: rgba(242, 237, 227, 0.85);
    }

    .econ-line .sub {
      color: rgba(242, 237, 227, 0.45);
      font-size: 12px;
      margin-top: 2px;
    }

    .econ-line .val {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      letter-spacing: -0.02em;
      color: var(--paper);
      white-space: nowrap;
    }

    .econ-line.total {
      border-bottom: none;
      margin-top: 20px;
      padding-top: 24px;
      border-top: 1px solid rgba(242, 237, 227, 0.2);
    }

    .econ-line.total .lbl {
      color: var(--paper);
      font-size: 16px;
    }

    .econ-line.total .val {
      font-size: 44px;
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .econ-foot {
      margin-top: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      color: rgba(242, 237, 227, 0.45);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* STEPS (timeline) */
    .steps {
      background: var(--paper);
      padding: 140px 36px;
    }

    .steps-inner {
      max-width: 1480px;
      margin: 0 auto;
    }

    .steps .mono {
      color: var(--ink-mute);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .steps .mono::before {
      content: '';
      width: 14px;
      height: 1px;
      background: currentColor;
    }

    .steps h2 {
      font-size: clamp(40px, 4.8vw, 84px);
      font-weight: 300;
      max-width: 900px;
      margin-bottom: 72px;
    }

    .steps h2 em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .step-list {
      border-top: 1px solid var(--rule);
    }

    .step {
      display: grid;
      grid-template-columns: 80px 0.9fr 1.6fr 140px;
      gap: 40px;
      padding: 40px 0;
      border-bottom: 1px solid var(--rule);
      align-items: baseline;
      transition: padding-left 0.4s cubic-bezier(.2, .7, .2, 1);
    }

    .step:hover {
      padding-left: 16px;
    }

    .step .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--ink-mute);
    }

    .step h3 {
      font-size: 32px;
      font-weight: 300;
    }

    .step p {
      color: var(--ink-soft);
      font-size: 15px;
      max-width: 520px;
    }

    .step .when {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-align: right;
      color: var(--lime-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* FORM */
    .apply {
      background: var(--paper);
      padding: 60px 36px 140px;
    }

    .apply-inner {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1.4fr;
    }

    .apply-left {
      background: var(--moss);
      color: var(--paper);
      padding: 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 40px;
      position: relative;
      overflow: hidden;
    }

    .apply-left::before {
      content: '';
      position: absolute;
      right: -40%;
      top: -20%;
      width: 120%;
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(44, 182, 114, 0.35), transparent 60%);
      pointer-events: none;
    }

    .apply-left .mono {
      color: rgba(242, 237, 227, 0.55);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .apply-left .mono::before {
      content: '';
      width: 14px;
      height: 1px;
      background: currentColor;
    }

    .apply-left h2 {
      font-size: 44px;
      font-weight: 300;
      color: var(--paper);
      position: relative;
    }

    .apply-left h2 em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .apply-left p {
      font-size: 15px;
      color: rgba(242, 237, 227, 0.75);
      position: relative;
    }

    .apply-left ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
    }

    .apply-left li {
      font-size: 14px;
      color: rgba(242, 237, 227, 0.8);
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 12px;
    }

    .apply-left li::before {
      content: '✓';
      color: var(--lime);
      font-weight: 600;
    }

    .apply-right {
      padding: 56px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }

    .field input,
    .field select,
    .field textarea {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      padding: 10px 0;
      transition: border-color 0.2s;
      width: 100%;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--lime-2);
    }

    .field textarea {
      resize: vertical;
      min-height: 84px;
    }

    .form-foot {
      margin-top: 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .check {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 12px;
      color: var(--ink-soft);
      max-width: 420px;
      line-height: 1.5;
      cursor: pointer;
    }

    .check input {
      accent-color: var(--lime-2);
      margin-top: 2px;
    }

    .submit-btn {
      background: var(--lime-grad);
      color: #fff;
      border: none;
      cursor: pointer;
    }

    .success {
      grid-column: 1 / -1;
      padding: 80px 56px;
      text-align: center;
    }

    .success h3 {
      font-size: 40px;
      font-weight: 400;
      margin-bottom: 16px;
    }

    .success h3 em {
      background: var(--lime-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .success p {
      color: var(--ink-soft);
      max-width: 420px;
      margin: 0 auto;
      font-size: 15px;
    }

    /* FOOTER */
    footer {
      background: var(--moss);
      color: var(--paper);
      padding: 56px 36px 28px;
    }

    .foot-top {
      max-width: 1480px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 48px;
      padding-bottom: 64px;
      border-bottom: 1px solid rgba(242, 237, 227, 0.12);
    }

    .foot-brand p {
      color: rgba(242, 237, 227, 0.55);
      max-width: 320px;
      margin-top: 16px;
      font-size: 14px;
    }

    .foot-col h5 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(242, 237, 227, 0.45);
      margin-bottom: 20px;
      font-weight: 500;
    }

    .foot-col ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .foot-col a {
      color: rgba(242, 237, 227, 0.8);
      font-size: 14px;
      transition: color .2s;
    }

    .foot-col a:hover {
      color: var(--lime);
    }

    .foot-bot {
      max-width: 1480px;
      margin: 0 auto;
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(242, 237, 227, 0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media (max-width: 960px) {
      nav.top {
        padding: 14px 20px;
        grid-template-columns: 1fr auto;
      }

      .nav-mid {
        display: none;
      }

      .hero {
        padding: 110px 20px 48px;
      }

      .hero-grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .hero-ticker {
        grid-template-columns: 1fr 1fr;
      }

      .letter,
      .included,
      .econ,
      .steps,
      .apply {
        padding-left: 20px;
        padding-right: 20px;
      }

      .inc-grid {
        grid-template-columns: 1fr;
      }

      .econ-sheet {
        grid-template-columns: 1fr;
      }

      .econ-col.left {
        border-right: none;
        border-bottom: 1px solid rgba(242, 237, 227, 0.12);
      }

      .econ-col {
        padding: 32px 24px;
      }

      .included-head,
      .form-row {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .step {
        grid-template-columns: 60px 1fr;
        gap: 16px;
      }

      .step p,
      .step .when {
        grid-column: 2;
      }

      .step .when {
        text-align: left;
        margin-top: 4px;
      }

      .apply-inner {
        grid-template-columns: 1fr;
      }

      .apply-left,
      .apply-right {
        padding: 32px 24px;
      }

      .foot-top {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="js/site-firebase.js"></script>
  <script type="text/babel" src="js/operator-page.js"></script>
</body>

</html>
